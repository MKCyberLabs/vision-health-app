<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Health Matrix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles that can't be purely utility-based or are easier this way */
        #result { display: none; }
        #loading { display: none; }
    </style>
</head>
<body class="bg-pink-50 font-sans text-gray-800 antialiased min-h-screen p-4 md:p-8 flex justify-center items-start">
    <div class="bg-white rounded-3xl shadow-xl border border-pink-100 p-6 md:p-12 w-full max-w-4xl mt-10">
        <h2 class="text-4xl md:text-5xl font-extrabold text-center text-pink-900 mb-8 tracking-tight">🌸 AI Health Matrix</h2>
        <form id="uploadForm" class="space-y-8">
            <div>
                <label class="block text-xl font-semibold text-pink-800 mb-3">Food Image (Required):</label>
                <div class="flex flex-col sm:flex-row gap-4">
                    <label for="imageUpload" class="flex-1 cursor-pointer bg-pink-100 hover:bg-pink-200 text-pink-800 font-bold text-xl py-4 rounded-xl border-2 border-pink-300 transition-colors text-center shadow-sm">
                        📁 Upload Image
                    </label>
                    <input type="file" id="imageUpload" accept="image/*" class="hidden">

                    <label for="imageCamera" class="flex-1 cursor-pointer bg-green-100 hover:bg-green-200 text-green-800 font-bold text-xl py-4 rounded-xl border-2 border-green-300 transition-colors text-center shadow-sm">
                        📸 Take Photo
                    </label>
                    <input type="file" id="imageCamera" accept="image/*" capture="environment" class="hidden">
                </div>
            </div>

            <div id="previewContainer" class="hidden mt-6">
                <p class="block text-xl font-semibold text-pink-800 mb-3">Image Preview:</p>
                <img id="imagePreview" src="" alt="Selected food preview" class="w-full max-h-[600px] object-cover rounded-2xl border-4 border-pink-200 shadow-md">
            </div>

            <div>
                <label for="weight" class="block text-xl font-semibold text-pink-800 mb-3">Weight / Portion (Optional):</label>
                <input type="text" id="weight" placeholder="e.g., 100g, 1 slice, 2 cups" class="w-full text-xl p-4 border-2 border-pink-200 rounded-xl focus:outline-none focus:border-green-400 focus:ring-2 focus:ring-green-200 transition-all placeholder-pink-300 text-gray-700">
            </div>

            <button id="submitBtn" type="submit" class="w-full flex justify-center items-center gap-3 bg-gradient-to-r from-pink-500 to-green-500 text-white font-bold text-2xl py-5 rounded-2xl hover:from-pink-600 hover:to-green-600 transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1">
                <span>Analyze Meal ✨</span>
            </button>
        </form>

        <div id="loading" class="text-2xl text-pink-600 italic font-medium text-center mt-10 animate-pulse">
            Analyzing your meal... 🌸 Please wait.
        </div>
        <div id="result" class="mt-10 bg-green-50 text-green-900 p-8 rounded-2xl border-2 border-green-200 text-xl md:text-2xl leading-relaxed whitespace-pre-wrap shadow-inner font-medium"></div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const loading = document.getElementById('loading');
        const resultDiv = document.getElementById('result');
        const imageUpload = document.getElementById('imageUpload');
        const imageCamera = document.getElementById('imageCamera');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const submitBtn = document.getElementById('submitBtn');

        let selectedFile = null;

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    imagePreview.src = e.target.result;
                    previewContainer.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        }

        imageUpload.addEventListener('change', handleFileSelect);
        imageCamera.addEventListener('change', handleFileSelect);

        function setLoadingState() {
            submitBtn.disabled = true;
            submitBtn.classList.remove('hover:-translate-y-1', 'hover:shadow-xl', 'hover:from-pink-600', 'hover:to-green-600');
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');
            submitBtn.innerHTML = `
                <svg class="animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Analyzing...</span>
            `;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!selectedFile) {
                alert("Please select or take an image first.");
                return;
            }

            const formData = new FormData();
            formData.append('image', selectedFile);
            formData.append('weight', document.getElementById('weight').value);

            loading.style.display = 'block';
            resultDiv.style.display = 'none';
            setLoadingState();

            try {
                const response = await fetch('/analyze', { method: 'POST', body: formData });
                handleBackendResponse(await response.json());
            } catch (err) {
                restoreSubmitButton();
                showResult("An error occurred connecting to the server.");
            }
        });

        function restoreSubmitButton() {
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            submitBtn.classList.add('hover:-translate-y-1', 'hover:shadow-xl', 'hover:from-pink-600', 'hover:to-green-600');
            submitBtn.innerHTML = '<span>Analyze Meal ✨</span>';
        }

        function handleBackendResponse(data) {
            loading.style.display = 'none';
            restoreSubmitButton();
            if (data.status === "success") {
                showResult(data.result);
            } else if (data.status === "needs_approval") {
                resultDiv.innerHTML = `
                    <p class="text-yellow-600 mb-4 text-2xl font-bold">⚠️ System Confirmation Required:</p>
                    <pre class="whitespace-pre-wrap mb-6 font-sans text-xl">${data.message}</pre>
                    <div class="flex gap-4">
                        <button onclick="sendReply('${data.sessionId}', 'y')" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl text-xl transition-colors shadow-md">Confirm (Yes)</button>
                        <button onclick="sendReply('${data.sessionId}', 'n')" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-xl text-xl transition-colors shadow-md">Cancel (No)</button>
                    </div>
                `;
                resultDiv.style.display = 'block';
            } else {
                showResult("Error: " + (data.message || "Unknown error"));
            }
        }

        async function sendReply(sessionId, answer) {
            loading.style.display = 'block';
            resultDiv.style.display = 'none';
            try {
                const response = await fetch('/reply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId, answer })
                });
                handleBackendResponse(await response.json());
            } catch (err) {
                showResult("Failed to send response.");
            }
        }

        function showResult(text) {
            loading.style.display = 'none';
            resultDiv.textContent = text;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
