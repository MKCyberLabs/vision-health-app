version: '3.8'

services:
  vision-app:
    build: .
    container_name: vision-health
    restart: unless-stopped

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vision.rule=Host(`vision.mkcyberlabs.in`)"
      - "traefik.http.routers.vision.entrypoints=websecure"
      - "traefik.http.routers.vision.tls.certresolver=letsencrypt"
      - "traefik.http.services.vision.loadbalancer.server.port=3000"

    environment:
      - GEMINI_API_URL=http://host.docker.internal:5000

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      # Mount the host temp folder to share uploaded images with the Python backend
      - ./temp:/usr/src/app/temp

    networks:
      - proxy

networks:
  proxy:
    external: true
